<!DOCTYPE HTML>
<html>
	<head>
		<title>
			
		</title>
				   <script src="https://cdn.tailwindcss.com"></script>

	</head>
	<body>
		<div class="w-full min-h-screen bg-[#0B0818] text-white p-8">
			<div class="mb-6">
				<h1 class="text-6xl font-bold text-purple-400">
					K-POP
				</h1>

				<p class="text-pink-400 text-2xl italic mt-2">
					Universe 
				</p>
			</div>
			
			<!----------------Main Container img--------------->
		<div class="bg-[#151127] rounded-3xl border border-purple-900 p-8">
			<div class="flex flex-col lg:flex-row items-center gap-10">
				<div class="flex-1">
					<h1 id="groupName" class="text-6xl font-bold bg-gradient-to-r from-pink-500 to-purple-400 bg-clip-text text-transparent">Bts</h1>
					
					<div class="w-20 h-1 bg-pink-500 rounded mt-2"></div>

					
					<p
						id="groupDesc"
						class="text-gray-300 mt-8 leading-8">
						South Korean boy band formed in 2013.
					</p>
				</div>
				 <div class="flex-1">

                <img
                    id="groupImage"
                    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRVal5nYKpKanWdqohjeoFSlafclgFoDrG9NA&s"
                    class="w-full rounded-3xl border border-purple-700  bg-blue-500 transition delay-150 duration-300 ease-in-out hover:-translate-y-1 hover:scale-50 hover:bg-indigo-500">

            </div>
			</div>
		</div>
		<!--------------Buttons------------>
		<div class="flex flex-wrap gap-4  mt-8 overflow-y-auto lg:px-0 lg:flex-row sm:px-40 sm:flex-col lg:font-medium sm:w-[100%] sm:font-bold lg:text-lg sm:text-4xl">
			
			 <button
				class="px-6 py-3 bg-purple-700 rounded-2xl hover:outline-solid"
				onclick="
				document.getElementById('groupName').innerHTML='BLACKPINK';
				document.getElementById('groupDesc').innerHTML='Popular girl group under YG Entertainment.';
				document.getElementById('groupImage').src='https://images.nu.nl/m/hckxqcsarrm5_wd854/188/485/5714/3215/blackpink.jpg';
				">
				BLACKPINK
			</button>
			
			<button
				class="px-6 py-3 bg-purple-700 rounded-2xl "
				onclick="
				document.getElementById('groupName').innerHTML='KatsEye';
				document.getElementById('groupDesc').innerHTML='Popular girl group under Hybe Entertainment.';
				document.getElementById('groupImage').src='https://variety.com/wp-content/uploads/2023/11/CJP15555-1.jpg';
				">
				KatsEye
			</button>
			<button
				class="px-6 py-3 bg-purple-700 rounded-2xl "
				onclick="
				document.getElementById('groupName').innerHTML='TxT';
				document.getElementById('groupDesc').innerHTML='South Korean boy band formed by Big Hit Entertainment. ';
				document.getElementById('groupImage').src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQbG_Al5rHhq6A-PQJz14BT8CU7w8U9cRDHiw&s';
				">
				TxT
			</button>
			<button
				class="px-6 py-3 bg-purple-700 rounded-2xl"
				onclick="
				document.getElementById('groupName').innerHTML='TWICE';
				document.getElementById('groupDesc').innerHTML='The Nations Girl Group';
				document.getElementById('groupImage').src='https://assets.teenvogue.com/photos/664b9bebd010effa1166dda4/16:9/w_2560%2Cc_limit/TWICE_FINAL_HEADER.jpg';
				">
				TWICE
			</button>
		
			
			<button
				class="px-6 py-3 bg-purple-700 rounded-2xl"
				onclick="
				document.getElementById('groupName').innerHTML='Stray Kids';
				document.getElementById('groupDesc').innerHTML='Known for their self-producing talents and intense.';
				document.getElementById('groupImage').src='https://assets.teenvogue.com/photos/612f8bf4e8c260b3d41cc82c/16:9/w_2560%2Cc_limit/Stray%2520Kids%2520(1).jpg';
				">
				Stray Kids
			</button>
			<button
				class="px-6 py-3 bg-purple-700 rounded-2xl"
				onclick="
				document.getElementById('groupName').innerHTML='SEVENTEEN';
				document.getElementById('groupDesc').innerHTML='A powerhouse group celebrated for their synchronized choreography .';
				document.getElementById('groupImage').src='https://images.squarespace-cdn.com/content/v1/68e523d70f55e10baf8bbf7a/1760465146359-BFVS9ZMWXEIG2OARUP13/seventeen-header.jpg';
				">
				SEVENTEEN
			</button>
			<button
				class="px-6 py-3 bg-purple-700 rounded-2xl"
				onclick="
				document.getElementById('groupName').innerHTML='ENHYPEN';
				document.getElementById('groupDesc').innerHTML='Rapidly rising as one of the top acts of their generation.';
				document.getElementById('groupImage').src='https://wwd.com/wp-content/uploads/2025/08/Enhypen-k-pop-boy-band-bag-esentials1.jpg?crop=0px%2C4px%2C2264px%2C1267px&resize=1000%2C563';
				">
				ENHYPEN
			</button>
			<button
				class="px-6 py-3 bg-purple-700 rounded-2xl"
				onclick="
				document.getElementById('groupName').innerHTML='NewJeans';
				document.getElementById('groupDesc').innerHTML='A fourth-generation sensation.';
				document.getElementById('groupImage').src='https://assets.teenvogue.com/photos/66e1b07f3bfb5a4954f87046/16:9/w_2560%2Cc_limit/GettyImages-2164908925.jpg';
				">
				NewJeans
			</button>
			<button
				class="px-6 py-3 bg-purple-700 rounded-2xl"
				onclick="
				document.getElementById('groupName').innerHTML='SHINee';
				document.getElementById('groupDesc').innerHTML='a legendary, second-generation South Korean boy group formed by SM Entertainment';
				document.getElementById('groupImage').src='https://i0.wp.com/kstationtv.com/wp-content/uploads/2020/05/shinee-2.jpg?fit=900%2C450&ssl=1';
				">
				SHINee
			</button>
		</div>
		
		</div>
		</div>
		
		
		
		
		

	
	</body>
</html>
